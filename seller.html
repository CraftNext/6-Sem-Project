<!-- this is seller.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seller Shop – CraftNext</title>
<link rel="stylesheet" href="style.css">
<script src="theme.js"></script>
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
    <a class="brand" href="index.html">CraftNext</a>

    <div>
        <a href="index.html">← Home</a>
        <span id="navUser"></span>
    </div>
</header>


<section>

    <!-- SELLER HEADER -->
    <div class="seller-header">
        <img id="sellerImg" class="seller-avatar">
        <div>
            <h2 id="sellerName"></h2>
            <p>Handmade artisan shop</p>
        </div>
    </div>

    <h3>Products by Seller</h3>

    <div class="product-grid" id="sellerProducts"></div>

</section>


<!-- FLOATING CART -->
<div class="floating-cart" onclick="location.href='cart.html'">
 <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4h2l2.4 12.4a2 2 0 0 0 2 1.6h7.2a2 2 0 0 0 2-1.6L20 8H6"/><circle cx="9.5" cy="20" r="1.4"/><circle cx="17.5" cy="20" r="1.4"/></svg>
 <span id="cartCount">0</span>
</div>


<script src="api.js"></script>
<script src="script.js"></script>


<script>

/* ================= NAVBAR AUTH ================= */

const navUser = document.getElementById("navUser");

const user = localStorage.getItem("cn_user")
? JSON.parse(localStorage.getItem("cn_user"))
: null;

if(user){

navUser.innerHTML = `
<span style="margin-left:10px;">Hi, ${user.name}</span>
${user.role === "admin" ? '<a href="admin.html" style="margin-left:10px;">Admin Panel</a>' : ""}
<a href="#" id="logoutBtn" style="margin-left:10px;">Logout</a>
`;

document.getElementById("logoutBtn").onclick = function(e){
e.preventDefault();
Auth.logout();
};

}else{

navUser.innerHTML = `
<a href="login.html" style="margin-left:10px;">Login</a>
`;

}


/* ================= GET SELLER FROM URL ================= */

const sellerId = new URLSearchParams(location.search).get("seller");

if (!sellerId) {
  document.body.innerHTML = "<h2 style='padding:40px'>Seller not found</h2>";
  throw new Error("Invalid seller");
}

document.getElementById("sellerImg").src = "Images/Clock/Ganesha Image.jpg";

const box = document.getElementById("sellerProducts");

(async () => {
  box.innerHTML = `<p style="padding:20px;color:#888">Loading…</p>`;
  try {
    const list = await Products.getAll({ seller: sellerId });
    cacheProducts(list);

    document.getElementById("sellerName").innerText =
      (list[0] && list[0].sellerName) || "Seller Shop";

    if (!list.length) {
      box.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><h3>No products found from this seller</h3></div>`;
      return;
    }

    box.innerHTML = "";
    list.forEach(p => {
      const card = document.createElement("div");
      card.className = "product-card";
      card.innerHTML = productCardHTML(p);
      box.appendChild(card);
    });
    renderWishlistIcons();
  } catch (err) {
    box.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><p>Could not load this seller. Make sure the backend is running.</p></div>`;
  }
})();

</script>

</body>
</html>
