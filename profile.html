<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">

<meta property="og:site_name" content="CraftNext">

<title>My Profile – CraftNext</title>

<link rel="stylesheet" href="style.css?v=5">

<style>
.profile-page { padding: 48px clamp(20px, 6vw, 60px); max-width: 1100px; margin: auto; }

.profile-grid {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 24px;
  margin-top: 24px;
}

@media (max-width: 760px) {
  .profile-grid { grid-template-columns: 1fr; }
}

.profile-sidebar {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 28px 22px;
  text-align: center;
  height: fit-content;
  animation: fadeInLeft .5s cubic-bezier(.16,1,.3,1);
}

.avatar-wrap { position: relative; width: 76px; margin: 0 auto 16px; }

.profile-avatar {
  width: 76px;
  height: 76px;
  background: var(--ink);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: 600;
  color: var(--on-ink);
  font-family: var(--font-serif);
  animation: scaleIn .5s cubic-bezier(.16,1,.3,1) .15s backwards;
}

.avatar-edit-btn {
  position: absolute;
  bottom: -2px;
  right: -2px;
  width: 26px;
  height: 26px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 50%;
  display: grid;
  place-items: center;
  cursor: pointer;
  color: var(--text);
  transition: background 0.15s;
}
.avatar-edit-btn:hover { background: var(--surface-2); }
.avatar-edit-btn .icon { width: 13px; height: 13px; }

.profile-sidebar h3 {
  font-size: 18px;
  margin-bottom: 4px;
}

.profile-sidebar .role-label {
  display: inline-block;
  padding: 3px 11px;
  background: var(--accent-soft);
  color: var(--accent-ink);
  border-radius: var(--radius-sm);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .03em;
  margin-bottom: 20px;
}

.sidebar-nav-link {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 14px;
  color: var(--text);
  transition: background .2s, color .2s, transform .15s;
  text-decoration: none;
  margin-bottom: 4px;
}

.sidebar-nav-link:hover { transform: translateX(3px); }

.sidebar-nav-link:hover,
.sidebar-nav-link.active {
  background: var(--surface-2);
  color: var(--ink);
  font-weight: 600;
}

.sidebar-nav-link.logout-link {
  color: var(--danger);
  margin-top: 16px;
}

.sidebar-nav-link.logout-link:hover { background: var(--danger-soft); }

/* MAIN PANELS */
.profile-main > div { display: none; }
.profile-main > div.active { display: block; }

.profile-section {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 28px;
  margin-bottom: 24px;
  animation: fadeInUp .5s cubic-bezier(.16,1,.3,1) .1s backwards;
}

.profile-section h2 {
  font-size: 18px;
  margin-bottom: 22px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.form-field { margin-bottom: 16px; }

.form-field label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  margin-bottom: 6px;
}

.form-field input {
  width: 100%;
  padding: 10px 13px;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font: inherit;
  color: var(--text);
  outline: none;
  background: var(--surface);
  transition: border-color 0.15s;
}

.form-field input::placeholder {
  color: var(--muted);
  opacity: 0.8;
}

.form-field input:focus {
  border-color: var(--accent);
  box-shadow: var(--ring);
}

.save-btn {
  padding: 11px 26px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background .2s, transform .15s, box-shadow .2s;
}

.save-btn:hover { background: var(--accent-dark); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(179,73,31,.25); }
.save-btn:active { transform: scale(.98); }

.msg { padding: 11px 14px; border-radius: var(--radius-sm); margin-bottom: 14px; font-size: 13.5px; display: none; }
.msg.error { background: var(--danger-soft); color: var(--danger); }
.msg.success { background: var(--ok-soft); color: var(--ok); }

/* ORDERS */
.order-card {
  background: var(--bg);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 12px;
  border: 1px solid var(--line);
  animation: fadeInUp .4s cubic-bezier(.16,1,.3,1) backwards;
  transition: border-color .2s, transform .2s, box-shadow .2s;
}

.order-card:nth-child(1) { animation-delay: .05s; }
.order-card:nth-child(2) { animation-delay: .1s; }
.order-card:nth-child(3) { animation-delay: .15s; }
.order-card:nth-child(4) { animation-delay: .2s; }

.order-card:hover {
  border-color: var(--line-strong);
  transform: translateY(-2px);
  box-shadow: var(--shadow-sm);
}

.order-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.order-id { font-size: 13px; color: var(--muted); }
.order-date { font-size: 13px; color: var(--muted); }

.order-items { font-size: 14px; color: var(--text); margin-bottom: 10px; }

.order-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.order-total { font-weight: 700; font-family: var(--font-serif); color: var(--ink); }

.status-badge {
  padding: 4px 10px;
  border-radius: var(--radius-sm);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .02em;
}

.status-pending   { background: var(--warn-soft); color: var(--warn); }
.status-confirmed { background: var(--ok-soft); color: var(--ok); }
.status-shipped   { background: var(--info-soft); color: var(--info); }
.status-delivered { background: var(--ok-soft); color: var(--ok); }
.status-cancelled { background: var(--danger-soft); color: var(--danger); }

.empty-state { text-align: center; padding: 36px; color: var(--muted); }

.address-card {
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  animation: fadeInRight .4s cubic-bezier(.16,1,.3,1) backwards;
  transition: border-color .2s, transform .2s;
}

.address-card:nth-child(1) { animation-delay: .05s; }
.address-card:nth-child(2) { animation-delay: .1s; }
.address-card:nth-child(3) { animation-delay: .15s; }

.address-card:hover {
  border-color: var(--line-strong);
  transform: translateY(-2px);
}

.address-card .label { font-weight: 700; font-size: 13px; color: var(--accent-ink); text-transform: uppercase; letter-spacing: .02em; }
.address-card .details { font-size: 14px; color: var(--text); margin-top: 4px; line-height: 1.5; }
.address-card .remove-address-btn {
  background: none;
  border: 1px solid var(--danger-soft);
  color: var(--danger);
  border-radius: var(--radius-sm);
  padding: 6px 10px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  flex-shrink: 0;
}
.address-card .remove-address-btn:hover { background: var(--danger-soft); }

.cancel-order-btn {
  margin-top: 12px;
  padding: 7px 14px;
  background: transparent;
  border: 1px solid var(--danger-soft);
  color: var(--danger);
  border-radius: var(--radius-sm);
  font: inherit;
  font-size: 12.5px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}
.cancel-order-btn:hover { background: var(--danger-soft); }
.cancel-order-btn:disabled { opacity: 0.6; cursor: default; }

.invoice-btn {
  margin-top: 12px;
  margin-right: 8px;
  padding: 7px 14px;
  background: transparent;
  border: 1px solid var(--line-strong);
  color: var(--ink);
  border-radius: var(--radius-sm);
  font: inherit;
  font-size: 12.5px;
  font-weight: 600;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: background 0.15s;
}
.invoice-btn:hover { background: var(--surface-2); }
.invoice-btn:disabled { opacity: 0.6; cursor: default; }
</style>
<script src="theme.js?v=5"></script>
</head>

<script>

/* ——— GUARD ——— */
const currentUser = getUser();
if (!currentUser) {
  window.location.href = "login.html";
}

/* ——— AVATAR ——— */
function renderAvatar(user) {
  const initialEl = document.getElementById("profileInitial");
  const imgEl = document.getElementById("profileAvatarImg");
  if (user.avatar) {
    imgEl.src = imgUrl(user.avatar);
    imgEl.style.display = "flex";
    initialEl.style.display = "none";
  } else {
    initialEl.textContent = (user.name || "?")[0].toUpperCase();
    initialEl.style.display = "flex";
    imgEl.style.display = "none";
  }
}

async function uploadAvatar(file) {
  if (!file) return;
  try {
    const { avatar } = await Auth.uploadAvatar(file);
    currentUser.avatar = avatar;
    saveAuth(currentUser);
    renderAvatar(currentUser);
    showToast("Profile photo updated!", "success");
  } catch (e) {
    showToast(e.message || "Could not upload photo", "error");
  }
}

/* ——— INIT ——— */
renderAvatar(currentUser);
document.getElementById("profileNameDisplay").textContent = currentUser.name;
document.getElementById("profileRoleLabel").textContent = currentUser.role;
document.getElementById("editName").value = currentUser.name || "";
document.getElementById("editEmail").value = currentUser.email || "";

/* ——— NAVIGATION ——— */
function showSection(name, el) {
  document.querySelectorAll(".profile-main > div").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".sidebar-nav-link").forEach(a => a.classList.remove("active"));
  document.getElementById("panel-" + name).classList.add("active");
  if (el) el.classList.add("active");
  if (name === "addresses") loadAddresses();
}

/* ——— LOAD ORDERS ——— */
async function loadOrders() {
  try {
    const orders = await Orders.myOrders();
    const box = document.getElementById("ordersList");

    if (!orders.length) {
      box.innerHTML = `<div class="empty-state"><p>No orders yet. Start shopping!</p><br><a href="index.html" style="color:var(--accent-ink)">Browse Products →</a></div>`;
      return;
    }

    box.innerHTML = orders.map(o => {
      let trackingHTML = "";
      if (o.status === "cancelled") {
        trackingHTML = `
          <div style="margin-top: 15px; border-top: 1px dashed var(--line); padding-top: 15px; text-align: center; color: var(--danger); font-weight: 600; font-size: 13px;">
            ❌ This order has been cancelled.
          </div>
        `;
      } else {
        const statuses = ["pending", "confirmed", "shipped", "delivered"];
        const currentIndex = statuses.indexOf(o.status);
        const percent = currentIndex >= 0 ? (currentIndex / (statuses.length - 1)) * 100 : 0;
        
        const steps = [
          { label: "Ordered", num: 1 },
          { label: "Confirmed", num: 2 },
          { label: "Shipped", num: 3 },
          { label: "Delivered", num: 4 }
        ];

        const stepsHTML = steps.map((step, idx) => {
          let bg = "var(--surface)";
          let color = "var(--muted)";
          let borderColor = "var(--line-strong)";
          let fontW = "500";
          let labelColor = "var(--muted)";
          let content = step.num;

          if (idx < currentIndex) {
            bg = "var(--accent)";
            color = "white";
            borderColor = "var(--accent)";
            content = "✓";
          } else if (idx === currentIndex) {
            bg = "var(--accent-soft)";
            color = "var(--accent-ink)";
            borderColor = "var(--accent)";
            fontW = "700";
            labelColor = "var(--ink)";
          }

          return `
            <div style="display: flex; flex-direction: column; align-items: center; z-index: 2; position: relative;">
              <div style="width: 24px; height: 24px; border-radius: 50%; display: grid; place-items: center; font-size: 11px; font-weight: bold; background: ${bg}; color: ${color}; border: 2px solid ${borderColor};">${content}</div>
              <span style="font-size: 11px; font-weight: ${fontW}; margin-top: 6px; color: ${labelColor}">${step.label}</span>
            </div>
          `;
        }).join("");

        trackingHTML = `
          <div class="order-tracking" style="margin-top: 15px; border-top: 1px solid var(--line); padding-top: 18px; padding-bottom: 8px;">
            <div style="display: flex; justify-content: space-between; position: relative; max-width: 460px; margin: 0 auto;">
              <div style="position: absolute; top: 12px; left: 15px; right: 15px; height: 2px; background: var(--line); z-index: 1;"></div>
              <div style="position: absolute; top: 12px; left: 15px; right: 15px; height: 2px; background: var(--accent); z-index: 1; width: ${percent}%; transition: width 0.3s ease;"></div>
              ${stepsHTML}
            </div>
          </div>
        `;
      }

      return `
        <div class="order-card">
          <div class="order-card-header">
            <span class="order-id">Order #${o._id.slice(-6).toUpperCase()}</span>
            <span class="order-date">${new Date(o.createdAt).toLocaleDateString("en-IN", { day:"numeric", month:"short", year:"numeric" })}</span>
          </div>
          <div class="order-items">${o.items?.map(i => `${i.name} × ${i.qty}`).join(", ") || "—"}</div>
          <div class="order-footer" style="margin-bottom: 8px;">
            <span class="order-total">₹${o.totalAmount?.toLocaleString("en-IN")}</span>
            <span class="status-badge status-${o.status}">${o.status}</span>
          </div>
          <button class="invoice-btn" style="margin-bottom: 8px;" onclick="downloadInvoice('${o._id}', this)">
            <svg class="icon" style="width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
            Invoice
          </button>
          ${o.status === "pending" ? `<button class="cancel-order-btn" style="margin-bottom: 8px;" onclick="cancelOrder('${o._id}', this)">Cancel Order</button>` : ""}
          ${trackingHTML}
        </div>
      `;
    }).join("");
  } catch (e) {
    document.getElementById("ordersList").innerHTML = `<p style="color:var(--danger)">Could not load orders.</p>`;
  }
}

/* ——— INVOICE DOWNLOAD ——— */
async function downloadInvoice(id, btn) {
  btn.disabled = true;
  const orig = btn.innerHTML;
  btn.textContent = "Preparing…";
  try {
    const res = await fetch(`${API_BASE}/orders/${id}/invoice`, {
      headers: { Authorization: `Bearer ${getToken()}` },
    });
    if (!res.ok) throw new Error("Could not generate invoice");
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `CraftNext-Invoice-${id.slice(-8).toUpperCase()}.pdf`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  } catch (e) {
    showToast(e.message || "Invoice download failed", "error");
  } finally {
    btn.disabled = false;
    btn.innerHTML = orig;
  }
}

/* ——— CANCEL ORDER ——— */
async function cancelOrder(id, btn) {
  if (!confirm("Cancel this order?")) return;
  btn.disabled = true;
  btn.textContent = "Cancelling...";
  try {
    await Orders.cancel(id);
    await loadOrders();
  } catch (e) {
    alert(e.message || "Could not cancel order.");
    btn.disabled = false;
    btn.textContent = "Cancel Order";
  }
}

/* ——— ADDRESSES ——— */
async function loadAddresses() {
  const box = document.getElementById("addressList");
  box.innerHTML = `<div style="text-align:center;padding:20px;color:var(--muted)">Loading…</div>`;
  try {
    const addresses = await Auth.getAddresses();
    if (!addresses.length) {
      box.innerHTML = `<div class="empty-state"><p>No saved addresses yet.</p></div>`;
      return;
    }
    box.innerHTML = addresses.map(a => `
      <div class="address-card">
        <div>
          <div class="label">${esc(a.label)}</div>
          <div class="details">${esc(a.name)} · ${esc(a.phone || "")}<br>${esc(a.address)}, ${esc(a.city)} – ${esc(a.pincode)}</div>
        </div>
        <button class="remove-address-btn" onclick="deleteAddress('${a._id}')">Remove</button>
      </div>
    `).join("");
  } catch (e) {
    box.innerHTML = `<p style="color:var(--danger)">Could not load addresses.</p>`;
  }
}

async function addAddress() {
  const payload = {
    label: document.getElementById("addrLabel").value.trim() || "Home",
    name: document.getElementById("addrName").value.trim(),
    phone: document.getElementById("addrPhone").value.trim(),
    address: document.getElementById("addrAddress").value.trim(),
    city: document.getElementById("addrCity").value.trim(),
    pincode: document.getElementById("addrPincode").value.trim(),
  };
  const errEl = document.getElementById("addressError");

  if (!payload.name || !payload.address || !payload.city || !payload.pincode) {
    errEl.textContent = "Name, address, city, and pincode are required.";
    errEl.style.display = "block";
    return;
  }

  try {
    await Auth.addAddress(payload);
    errEl.style.display = "none";
    ["addrLabel","addrName","addrPhone","addrAddress","addrCity","addrPincode"].forEach(id => document.getElementById(id).value = "");
    loadAddresses();
  } catch (e) {
    errEl.textContent = e.message || "Could not save address.";
    errEl.style.display = "block";
  }
}

async function deleteAddress(id) {
  if (!confirm("Remove this address?")) return;
  try {
    await Auth.deleteAddress(id);
    loadAddresses();
  } catch (e) {
    alert(e.message || "Could not remove address.");
  }
}

/* ——— SAVE PROFILE ——— */
async function saveProfile() {
  const payload = {
    name: document.getElementById("editName").value.trim(),
    phone: document.getElementById("editPhone").value.trim(),
    address: document.getElementById("editAddress").value.trim(),
    city: document.getElementById("editCity").value.trim(),
  };

  try {
    const updated = await Auth.updateProfile(payload);
    saveAuth({ ...currentUser, ...updated });
    document.getElementById("profileSuccess").textContent = "Profile updated!";
    document.getElementById("profileSuccess").style.display = "block";
    document.getElementById("profileError").style.display = "none";
    document.getElementById("profileNameDisplay").textContent = updated.name;
    document.getElementById("profileInitial").textContent = (updated.name || "?")[0].toUpperCase();
  } catch (e) {
    document.getElementById("profileError").textContent = e.message;
    document.getElementById("profileError").style.display = "block";
    document.getElementById("profileSuccess").style.display = "none";
  }
}

/* ——— CHANGE PASSWORD ——— */
async function changePassword() {
  const np = document.getElementById("newPassword").value;
  const cp = document.getElementById("confirmPassword").value;

  if (np.length < 6) {
    document.getElementById("securityError").textContent = "Password must be at least 6 characters.";
    document.getElementById("securityError").style.display = "block";
    return;
  }

  if (np !== cp) {
    document.getElementById("securityError").textContent = "Passwords do not match.";
    document.getElementById("securityError").style.display = "block";
    return;
  }

  try {
    await Auth.updateProfile({ password: np });
    document.getElementById("securitySuccess").textContent = "Password changed successfully!";
    document.getElementById("securitySuccess").style.display = "block";
    document.getElementById("securityError").style.display = "none";
    document.getElementById("newPassword").value = "";
    document.getElementById("confirmPassword").value = "";
  } catch (e) {
    document.getElementById("securityError").textContent = e.message;
    document.getElementById("securityError").style.display = "block";
  }
}

/* ——— INIT ——— */
loadOrders();

</script>
