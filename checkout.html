<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout – CraftNext</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>
.checkout-page { padding: 50px 60px; max-width: 1100px; margin: auto; }

.checkout-page h1 {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  margin-bottom: 30px;
}

.checkout-grid {
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 28px;
  align-items: start;
}

.checkout-box {
  background: white;
  border-radius: 20px;
  padding: 32px;
  box-shadow: 0 2px 14px rgba(0,0,0,0.08);
}

.checkout-box h2 {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  margin-bottom: 22px;
}

.form-field { margin-bottom: 16px; }

.form-field label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: #666;
  font-family: 'Inter', sans-serif;
  margin-bottom: 6px;
}

.form-field input {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid #e5e5e5;
  border-radius: 10px;
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  outline: none;
  background: #fafafa;
  transition: border-color 0.2s;
}

.form-field input:focus {
  border-color: #e86a33;
  background: white;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

/* ORDER SUMMARY */
.summary-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid #f5f5f5;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
}

.summary-item:last-child { border-bottom: none; }

.summary-item-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.summary-item-img {
  width: 50px;
  height: 50px;
  object-fit: cover;
  border-radius: 8px;
  background: #f0f0f0;
}

.summary-item-name { font-weight: 500; color: #333; }
.summary-item-qty { color: #aaa; font-size: 12px; }

.summary-total {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 2px solid #f0e0d0;
  display: flex;
  justify-content: space-between;
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
}

.summary-total span { color: #e86a33; }

/* PAYMENT METHOD */
.payment-options {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.pay-option {
  flex: 1;
  padding: 12px;
  border: 1.5px solid #e5e5e5;
  border-radius: 10px;
  text-align: center;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: 0.2s;
  background: #fafafa;
}

.pay-option.selected {
  border-color: #e86a33;
  background: #fde8d8;
  color: #e86a33;
  font-weight: 600;
}

/* PLACE ORDER BUTTON */
.place-btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, #e86a33, #d95a25);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all 0.3s;
  margin-top: 8px;
}

.place-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 28px rgba(232,106,51,0.35);
}

.place-btn:disabled {
  background: #ccc;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.msg {
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 14px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  display: none;
}

.msg.error { background: #fff0f0; color: #c0392b; }
.msg.success { background: #f0fff4; color: #27ae60; }

/* SUCCESS OVERLAY */
.success-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  z-index: 999;
  display: none;
  align-items: center;
  justify-content: center;
}

.success-overlay.show { display: flex; }

.success-box {
  background: white;
  border-radius: 24px;
  padding: 50px 40px;
  text-align: center;
  max-width: 420px;
  box-shadow: 0 24px 60px rgba(0,0,0,0.2);
}

.success-icon {
  font-size: 64px;
  margin-bottom: 20px;
  animation: pop 0.5s ease;
}

@keyframes pop {
  0% { transform: scale(0); }
  80% { transform: scale(1.15); }
  100% { transform: scale(1); }
}

.success-box h2 {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  margin-bottom: 10px;
}

.success-box p {
  font-family: 'Inter', sans-serif;
  color: #666;
  margin-bottom: 28px;
}

.success-btn {
  padding: 13px 30px;
  background: #e86a33;
  color: white;
  border: none;
  border-radius: 10px;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  cursor: pointer;
}

@media (max-width: 800px) {
  .checkout-page { padding: 30px 20px; }
  .checkout-grid { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<header>
  <nav class="navbar">
    <a class="brand" href="index.html">CraftNext</a>
    <div class="nav-links">
      <a href="cart.html" class="back-btn">← Back to Cart</a>
    </div>
  </nav>
</header>

<!-- SUCCESS OVERLAY -->
<div class="success-overlay" id="successOverlay">
  <div class="success-box">
    <div class="success-icon">🎉</div>
    <h2>Order Placed!</h2>
    <p>Thank you for your purchase. Your order has been confirmed and will be shipped soon.</p>
    <p id="successOrderId" style="font-family:Inter,sans-serif;font-size:13px;color:#aaa;margin-bottom:24px"></p>
    <button class="success-btn" onclick="window.location.href='index.html'">Continue Shopping</button>
  </div>
</div>


<div class="checkout-page">
  <h1>Checkout</h1>

  <div class="checkout-grid">

    <!-- SHIPPING FORM -->
    <div class="checkout-box">
      <h2>Shipping Details</h2>
      <div class="msg error" id="checkoutError"></div>

      <div class="form-row">
        <div class="form-field">
          <label>Full Name *</label>
          <input type="text" id="shipName" placeholder="Your full name">
        </div>
        <div class="form-field">
          <label>Email *</label>
          <input type="email" id="shipEmail" placeholder="you@example.com">
        </div>
      </div>
      <div class="form-field">
        <label>Phone Number *</label>
        <input type="tel" id="shipPhone" placeholder="+91 XXXXX XXXXX">
      </div>
      <div class="form-field">
        <label>Address *</label>
        <input type="text" id="shipAddress" placeholder="House no., Street, Area">
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>City *</label>
          <input type="text" id="shipCity" placeholder="Mumbai">
        </div>
        <div class="form-field">
          <label>Pincode *</label>
          <input type="text" id="shipPincode" placeholder="400001">
        </div>
      </div>

      <h2 style="margin-top:24px">Payment Method</h2>
      <div class="payment-options">
        <div class="pay-option selected" onclick="selectPayment('COD', this)">💵 Cash on Delivery</div>
        <div class="pay-option" onclick="selectPayment('Online', this)">💳 Online (Coming Soon)</div>
      </div>

      <button class="place-btn" id="placeBtn" onclick="placeOrder()">
        Place Order
      </button>
    </div>

    <!-- ORDER SUMMARY -->
    <div class="checkout-box">
      <h2>Order Summary</h2>
      <div id="summaryItems"></div>
      <div class="summary-total">
        <span>Total</span>
        <span id="summaryTotal">₹0</span>
      </div>
    </div>

  </div>
</div>


<script>
/* =============================================
   CraftNext — Frontend API Helper
   All calls to the backend go through here
   ============================================= */

const API_BASE = "http://localhost:5000/api";

/* ——— AUTH HELPERS ——— */

function getToken() {
  return localStorage.getItem("cn_token");
}

function getUser() {
  try {
    return JSON.parse(localStorage.getItem("cn_user")) || null;
  } catch {
    return null;
  }
}

function saveAuth(data) {
  localStorage.setItem("cn_token", data.token);
  localStorage.setItem("cn_user", JSON.stringify(data));
}

function clearAuth() {
  localStorage.removeItem("cn_token");
  localStorage.removeItem("cn_user");
}

function isLoggedIn() {
  return !!getToken();
}

function isRole(role) {
  const u = getUser();
  return u && u.role === role;
}

/* ——— GENERIC FETCH WRAPPER ——— */

async function apiRequest(endpoint, method = "GET", body = null, auth = false) {
  const headers = { "Content-Type": "application/json" };

  if (auth) {
    const token = getToken();
    if (token) headers["Authorization"] = `Bearer ${token}`;
  }

  const options = { method, headers };
  if (body) options.body = JSON.stringify(body);

  const res = await fetch(API_BASE + endpoint, options);
  const data = await res.json();

  if (!res.ok) throw new Error(data.message || "Request failed");
  return data;
}

/* ——— AUTH ——— */

const Auth = {
  register: (payload) => apiRequest("/auth/register", "POST", payload),
  login: (email, password) => apiRequest("/auth/login", "POST", { email, password }),
  me: () => apiRequest("/auth/me", "GET", null, true),
  updateProfile: (payload) => apiRequest("/auth/profile", "PUT", payload, true),
  logout() {
    clearAuth();
    window.location.href = "login.html";
  },
};

/* ——— PRODUCTS ——— */

const Products = {
  getAll: (params = {}) => {
    const q = new URLSearchParams(params).toString();
    return apiRequest(`/products${q ? "?" + q : ""}`);
  },
  getById: (id) => apiRequest(`/products/${id}`),
  create: (payload) => apiRequest("/products", "POST", payload, true),
  update: (id, payload) => apiRequest(`/products/${id}`, "PUT", payload, true),
  delete: (id) => apiRequest(`/products/${id}`, "DELETE", null, true),
};

/* ——— ORDERS ——— */

const Orders = {
  create: (payload) => apiRequest("/orders", "POST", payload, true),
  myOrders: () => apiRequest("/orders/myorders", "GET", null, true),
  sellerOrders: () => apiRequest("/orders/seller", "GET", null, true),
  getById: (id) => apiRequest(`/orders/${id}`, "GET", null, true),
  updateStatus: (id, status) => apiRequest(`/orders/${id}/status`, "PUT", { status }, true),
};

/* ——— ADMIN ——— */

const Admin = {
  stats: () => apiRequest("/admin/stats", "GET", null, true),
  users: (params = {}) => {
    const q = new URLSearchParams(params).toString();
    return apiRequest(`/admin/users${q ? "?" + q : ""}`, "GET", null, true);
  },
  updateUser: (id, payload) => apiRequest(`/admin/users/${id}`, "PUT", payload, true),
  deleteUser: (id) => apiRequest(`/admin/users/${id}`, "DELETE", null, true),
  orders: () => apiRequest("/admin/orders", "GET", null, true),
  products: () => apiRequest("/admin/products", "GET", null, true),
  seedAdmin: () => apiRequest("/admin/seed-admin", "POST", null, true),
};

/* ——— UPDATE NAVBAR BASED ON LOGIN STATE ——— */

function updateNavbar() {
  const user = getUser();
  const loginLinks = document.querySelectorAll("a[href='login.html']");

  loginLinks.forEach((link) => {
    if (user) {
      link.textContent = user.name.split(" ")[0];
      link.href = user.role === "admin" ? "admin.html" :
                  user.role === "seller" ? "seller-dashboard.html" : "profile.html";
    }
  });

  // Show/hide sell link for buyers
  const sellLinks = document.querySelectorAll("a[href='sell.html']");
  if (user && user.role === "buyer") {
    sellLinks.forEach(l => l.style.display = "none");
  }
}

document.addEventListener("DOMContentLoaded", updateNavbar);

</script>

<script>

/* ================= CART CORE ================= */
function getCart() {
    try {
        const data = JSON.parse(localStorage.getItem("cart")) || [];
        return Array.isArray(data) ? data : [];
    } catch { return []; }
}
function saveCart(cart) {
    localStorage.setItem("cart", JSON.stringify(cart));
}
function addToCart(product) {
    if (!product || !product.name || !product.price || !product.img) {
        console.warn("Invalid product blocked:", product);
        alert("Product data invalid — not added");
        return;
    }
    const cart = getCart();
    const found = cart.find(p => p.name === product.name);
    if (found) {
        found.qty += 1;
    } else {
        cart.push({
            name: product.name,
            price: Number(product.price),
            img: product.img,
            seller: product.seller || "",
            qty: 1
        });
    }
    saveCart(cart);
    updateCartCount();
    alert("Added to cart!");
}
function removeFromCart(name) {
    const cart = getCart().filter(p => p.name !== name);
    saveCart(cart);
    if (typeof renderCart === "function") renderCart();
    updateCartCount();
}
function updateCartCount() {
    const cart = getCart();
    const count = cart.reduce((total, item) => total + (Number(item.qty) || 0), 0);
    const el = document.getElementById("cartCount");
    if (el) el.innerText = count;
}
document.addEventListener("DOMContentLoaded", updateCartCount);
function getWishlist() {
    const raw = JSON.parse(localStorage.getItem("wishlist")) || [];
    return raw.map(Number);
}
function saveWishlist(list) {
    localStorage.setItem("wishlist", JSON.stringify(list));
}
function toggleWishlist(id) {
    let list = getWishlist();
    if (list.includes(id)) { list = list.filter(x => x !== id); } else { list.push(id); }
    saveWishlist(list);
    updateHeartIcons(id);
}
function updateHeartIcons(id) {
    const list = getWishlist();
    document.querySelectorAll(`.wish[data-id="${id}"]`).forEach(heart => {
        if (list.includes(id)) { heart.classList.add("active"); } else { heart.classList.remove("active"); }
    });
}
function isWishlisted(id) { return getWishlist().includes(id); }
function renderWishlistIcons() {
    const list = getWishlist();
    document.querySelectorAll(".wish").forEach(el => {
        const id = Number(el.dataset.id);
        if (list.includes(id)) { el.classList.add("active"); } else { el.classList.remove("active"); }
    });
}
document.addEventListener("click", function(e) {
    if (e.target.classList.contains("wish")) {
        e.preventDefault();
        e.stopPropagation();
        const id = Number(e.target.dataset.id);
        toggleWishlist(id);
    }
});
document.addEventListener("DOMContentLoaded", renderWishlistIcons);

</script>
<script>

let selectedPayment = "COD";

function selectPayment(method, el) {
  selectedPayment = method;
  if (method === "Online") {
    alert("Online payment coming soon! Please use Cash on Delivery.");
    return;
  }
  document.querySelectorAll(".pay-option").forEach(o => o.classList.remove("selected"));
  el.classList.add("selected");
}

/* ——— LOAD CART ——— */
function loadSummary() {
  const cart = getCart();
  const box = document.getElementById("summaryItems");
  let total = 0;

  if (!cart.length) {
    box.innerHTML = `<p style="color:#aaa;font-family:Inter,sans-serif;text-align:center;padding:20px">Your cart is empty.</p>`;
    document.getElementById("placeBtn").disabled = true;
    return;
  }

  box.innerHTML = cart.map(item => {
    const itemTotal = item.price * item.qty;
    total += itemTotal;
    return `
      <div class="summary-item">
        <div class="summary-item-left">
          <img class="summary-item-img" src="${item.img}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/50'">
          <div>
            <div class="summary-item-name">${item.name}</div>
            <div class="summary-item-qty">Qty: ${item.qty}</div>
          </div>
        </div>
        <strong>₹${itemTotal.toLocaleString("en-IN")}</strong>
      </div>
    `;
  }).join("");

  document.getElementById("summaryTotal").textContent = "₹" + total.toLocaleString("en-IN");
}

/* ——— PRE-FILL IF LOGGED IN ——— */
const user = getUser();
if (user) {
  document.getElementById("shipName").value = user.name || "";
  document.getElementById("shipEmail").value = user.email || "";
}

/* ——— PLACE ORDER ——— */
async function placeOrder() {
  const name    = document.getElementById("shipName").value.trim();
  const email   = document.getElementById("shipEmail").value.trim();
  const phone   = document.getElementById("shipPhone").value.trim();
  const address = document.getElementById("shipAddress").value.trim();
  const city    = document.getElementById("shipCity").value.trim();
  const pincode = document.getElementById("shipPincode").value.trim();

  const errEl = document.getElementById("checkoutError");

  if (!name || !email || !phone || !address || !city || !pincode) {
    errEl.textContent = "Please fill in all required fields.";
    errEl.style.display = "block";
    return;
  }

  const cart = getCart();
  if (!cart.length) {
    errEl.textContent = "Your cart is empty.";
    errEl.style.display = "block";
    return;
  }

  const btn = document.getElementById("placeBtn");
  btn.disabled = true;
  btn.textContent = "Placing Order...";
  errEl.style.display = "none";

  const orderPayload = {
    items: cart.map(item => ({
      name: item.name,
      img: item.img,
      price: item.price,
      qty: item.qty,
      sellerName: item.seller || "",
    })),
    shipping: { name, email, phone, address, city, pincode },
    paymentMethod: selectedPayment,
  };

  try {
    // If logged in, use the API
    if (isLoggedIn()) {
      const order = await Orders.create(orderPayload);
      document.getElementById("successOrderId").textContent = `Order ID: #${order._id.slice(-6).toUpperCase()}`;
    }

    // Clear cart
    localStorage.removeItem("cart");
    updateCartCount();

    // Show success
    document.getElementById("successOverlay").classList.add("show");

  } catch (e) {
    errEl.textContent = e.message || "Order failed. Please try again.";
    errEl.style.display = "block";
    btn.disabled = false;
    btn.textContent = "Place Order";
  }
}

loadSummary();

</script>
