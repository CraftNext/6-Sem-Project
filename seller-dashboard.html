<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seller Dashboard – CraftNext</title>

<link rel="stylesheet" href="style.css">

<style>
/* .dashboard/.topbar/.products-grid/.product-card/.product-img/.product-info/
   .price/.category/.delete-btn all live in style.css — only the modal,
   tabs, and orders table are page-specific. */

.tabs { display: flex; gap: 6px; margin-bottom: 24px; border-bottom: 1px solid var(--line); }

.tab-btn {
  padding: 10px 4px;
  margin-right: 20px;
  border: none;
  background: none;
  font: inherit;
  font-size: 14.5px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.25s ease, border-color 0.25s ease, transform 0.15s ease;
}

.tab-btn:active { transform: scale(0.95); }

.tab-btn.active, .tab-btn:hover { color: var(--ink); border-color: var(--ink); }

.tab-panel { display: none; }
.tab-panel.active {
  display: block;
  animation: fadeInUp 0.4s cubic-bezier(.16,1,.3,1);
}

.product-card-actions { display: flex; gap: 8px; margin-top: 10px; }
.product-card-actions button { flex: 1; margin-top: 0; }

.edit-btn {
  padding: 8px;
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  font: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s;
}
.edit-btn:hover { background: var(--surface-2); }

.data-table-wrapper {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 22px;
  overflow-x: auto;
}

table { width: 100%; border-collapse: collapse; font-size: 13.5px; }

th {
  background: var(--bg);
  padding: 11px 14px;
  text-align: left;
  font-weight: 600;
  color: var(--muted);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  border-bottom: 1px solid var(--line);
}

td { padding: 13px 14px; border-bottom: 1px solid var(--line); vertical-align: middle; }
tr:last-child td { border-bottom: none; }

.status-badge {
  padding: 3px 9px;
  border-radius: var(--radius-sm);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
}

.status-pending   { background: var(--warn-soft); color: var(--warn); }
.status-confirmed { background: var(--ok-soft); color: var(--ok); }
.status-shipped   { background: var(--info-soft); color: var(--info); }
.status-delivered { background: var(--ok-soft); color: var(--ok); }
.status-cancelled { background: var(--danger-soft); color: var(--danger); }

.status-select {
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--line);
  font-size: 12.5px;
  font: inherit;
  cursor: pointer;
  background: var(--surface);
}

.loader { text-align: center; padding: 36px; color: var(--muted); font-size: 14px; }

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
backdrop-filter: blur(6px);
-webkit-backdrop-filter: blur(6px);
display:none;
justify-content:center;
align-items:center;
z-index:1000;
animation: fadeIn 0.25s ease-out;
}

.modal-box{
background:var(--surface);
border:1px solid var(--line);
padding:28px;
width:420px;
max-width:90vw;
border-radius:var(--radius-lg);
box-shadow: var(--shadow-lg);
animation: scaleIn 0.3s cubic-bezier(.16,1,.3,1);
}

.modal-box h3{
font-size:18px;
margin-bottom:16px;
}

.modal-box input,
.modal-box textarea,
.modal-box select{
width:100%;
padding:10px 12px;
margin-bottom:12px;
border:1px solid var(--line);
border-radius:var(--radius-sm);
font:inherit;
font-size:14px;
background:var(--surface);
}

.modal-box input:focus,
.modal-box textarea:focus,
.modal-box select:focus{
outline:none;
border-color:var(--accent);
box-shadow:var(--ring);
}

.modal-box button{
padding:10px 18px;
margin-right:10px;
border:none;
border-radius:var(--radius-sm);
font:inherit;
font-weight:600;
cursor:pointer;
background:var(--ink);
color:#fff;
transition:background .15s;
}

.modal-box button:hover{ background:var(--accent-dark); }

.modal-box button:last-child{
background:transparent;
color:var(--text);
border:1px solid var(--line);
}

.modal-box button:last-child:hover{ background:var(--surface-2); }

/* Drag and Drop Zone styling */
.drag-drop-zone {
    border: 2px dashed var(--line-strong);
    border-radius: var(--radius);
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s, background-color .15s;
    margin-bottom: 12px;
}
.drag-drop-zone.hover {
    border-color: var(--accent);
    background: var(--surface-2);
}
.image-preview-container {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 12px;
}
.preview-thumbnail {
    position: relative;
    width: 76px;
    height: 76px;
    border-radius: var(--radius-sm);
    overflow: hidden;
    border: 1px solid var(--line);
}
.preview-thumbnail img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.preview-thumbnail-remove {
    position: absolute;
    top: 2px;
    right: 2px;
    width: 18px;
    height: 18px;
    background: rgba(0, 0, 0, 0.6);
    color: white;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    font-size: 11px;
    display: grid;
    place-items: center;
    padding: 0;
    line-height: 1;
}
.preview-thumbnail-remove:hover {
    background: var(--danger);
}
</style>

<script src="theme.js"></script>
</head>


<body>

<header class="navbar">

<a class="brand" href="index.html">CraftNext</a>

<div>
<a href="index.html">Home</a>
<a href="#" onclick="Auth.logout()">Logout</a>
</div>

</header>


<section class="dashboard">

<div class="topbar">

<h2 id="welcome"></h2>

<button onclick="openAddModal()">+ Add Product</button>

</div>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('products', this)">My Products</button>
  <button class="tab-btn" onclick="showTab('orders', this)">Orders</button>
</div>

<div class="tab-panel active" id="tab-products">
  <div id="productGrid" class="products-grid"></div>
</div>

<div class="tab-panel" id="tab-orders">
  <div class="data-table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Order</th>
          <th>Buyer</th>
          <th>Items (yours)</th>
          <th>Status</th>
          <th>Date</th>
          <th>Update</th>
        </tr>
      </thead>
      <tbody id="ordersTableBody">
        <tr><td colspan="6" class="loader">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

</section>


<!-- ADD / EDIT PRODUCT MODAL -->

<div class="modal" id="modal">

<div class="modal-box">

<h3 id="modalTitle">Add New Product</h3>

<input id="pName" placeholder="Product Name">

<textarea id="pDesc" placeholder="Description"></textarea>

<input id="pPrice" type="number" placeholder="Price">

<input id="pStock" type="number" placeholder="Stock" value="10">

<select id="pCategory">

<option value="spiritual">Spiritual</option>
<option value="clock">Clock</option>
<option value="lippan">Lippan</option>
<option value="diya">Diya</option>
<option value="zharokha">Zharokha</option>

</select>

<div class="drag-drop-zone" id="dragDropZone">
    <svg class="icon upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="width:32px;height:32px;margin-bottom:8px;color:var(--muted)"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
    <p style="margin:0;font-size:13px;color:var(--muted)">Drag & drop images here or <span style="color:var(--accent-ink);font-weight:600;text-decoration:underline;cursor:pointer">browse</span></p>
    <input type="file" id="pImgFile" accept="image/*" multiple style="display:none">
</div>
<div id="imagePreviewContainer" class="image-preview-container"></div>
<p id="editImgHint" style="display:none;font-size:12px;color:var(--muted);margin:8px 0 12px">Image can't be changed here — remove and re-add the product to replace it.</p>

<button id="saveBtn" onclick="saveProduct()">Add Product</button>
<button onclick="closeModal()">Cancel</button>

</div>

</div>


<script src="api.js"></script>
<script>

/* AUTH CHECK */

const user = JSON.parse(localStorage.getItem("cn_user"));

if(!user || user.role !== "seller"){
alert("Seller login required");
window.location.href="login.html";
}

document.getElementById("welcome").innerText =
"Welcome, " + user.name;


/* TABS */

function showTab(name, btn) {
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("tab-" + name).classList.add("active");
  btn.classList.add("active");
  if (name === "orders") loadOrders();
}


/* MODAL */

let editingId = null;
let uploadedFiles = [];

document.addEventListener("DOMContentLoaded", () => {
  const zone = document.getElementById("dragDropZone");
  const input = document.getElementById("pImgFile");
  if (zone && input) {
    zone.addEventListener("click", () => input.click());
    zone.addEventListener("dragover", (e) => {
      e.preventDefault();
      zone.classList.add("hover");
    });
    zone.addEventListener("dragleave", () => {
      zone.classList.remove("hover");
    });
    zone.addEventListener("drop", (e) => {
      e.preventDefault();
      zone.classList.remove("hover");
      handleFiles(e.dataTransfer.files);
    });
    input.addEventListener("change", (e) => {
      handleFiles(e.target.files);
    });
  }
});

function handleFiles(files) {
  for (const file of files) {
    if (file.type.startsWith("image/")) {
      uploadedFiles.push(file);
    }
  }
  renderPreviews();
}

function removeFile(index) {
  uploadedFiles.splice(index, 1);
  renderPreviews();
}

function renderPreviews() {
  const container = document.getElementById("imagePreviewContainer");
  if (!container) return;
  container.innerHTML = "";
  uploadedFiles.forEach((file, idx) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const div = document.createElement("div");
      div.className = "preview-thumbnail";
      div.innerHTML = `
        <img src="${e.target.result}" alt="Preview">
        <button class="preview-thumbnail-remove" onclick="removeFile(${idx})" type="button">&times;</button>
      `;
      container.appendChild(div);
    };
    reader.readAsDataURL(file);
  });
}

function openAddModal(){
  editingId = null;
  uploadedFiles = [];
  renderPreviews();
  document.getElementById("modalTitle").textContent = "Add New Product";
  document.getElementById("saveBtn").textContent = "Add Product";
  document.getElementById("pName").value = "";
  document.getElementById("pDesc").value = "";
  document.getElementById("pPrice").value = "";
  document.getElementById("pStock").value = "10";
  document.getElementById("pCategory").value = "spiritual";
  document.getElementById("dragDropZone").style.display = "block";
  document.getElementById("editImgHint").style.display = "none";
  document.getElementById("modal").style.display="flex";
}

function openEditModal(id){
  const p = productsCache.find(x => x._id === id);
  if (!p) return;
  editingId = p._id;
  uploadedFiles = [];
  renderPreviews();
  document.getElementById("modalTitle").textContent = "Edit Product";
  document.getElementById("saveBtn").textContent = "Save Changes";
  document.getElementById("pName").value = p.name;
  document.getElementById("pDesc").value = p.description || "";
  document.getElementById("pPrice").value = p.price;
  document.getElementById("pStock").value = p.stock;
  document.getElementById("pCategory").value = p.category;
  document.getElementById("dragDropZone").style.display = "none";
  document.getElementById("editImgHint").style.display = "block";
  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}


/* SAVE PRODUCT (add or edit) */

async function saveProduct(){

  const name = document.getElementById("pName").value;
  const description = document.getElementById("pDesc").value;
  const price = document.getElementById("pPrice").value;
  const stock = document.getElementById("pStock").value;
  const category = document.getElementById("pCategory").value;

  if(!name || !price || !category){
    alert("Please fill required fields");
    return;
  }

  try {
    if (editingId) {
      await Products.update(editingId, { name, description, price: Number(price), stock: Number(stock), category });
    } else {
      if (uploadedFiles.length === 0) {
        alert("Please add at least one product photo");
        return;
      }
      const formData = new FormData();
      formData.append("name", name);
      formData.append("description", description);
      formData.append("price", price);
      formData.append("stock", stock);
      formData.append("category", category);
      for (const file of uploadedFiles) {
        formData.append("images", file);
      }

      await fetch("http://localhost:5000/api/products", {
        method: "POST",
        headers: { Authorization: `Bearer ${getToken()}` },
        body: formData,
      });
    }

    closeModal();
    loadProducts();
  } catch (err) {
    alert(err.message || "Could not save product");
  }

}


/* DELETE PRODUCT */

async function deleteProduct(id){

if(!confirm("Remove this product?")) return;

try {
  await Products.delete(id);
  loadProducts();
} catch (err) {
  alert(err.message || "Could not remove product");
}

}


/* LOAD SELLER PRODUCTS */

let productsCache = [];

async function loadProducts(){

const grid = document.getElementById("productGrid");
grid.innerHTML = `<p style="color:var(--muted);padding:20px">Loading…</p>`;

try {
  productsCache = await Products.mine();

  if (!productsCache.length) {
    grid.innerHTML = `<div class="empty-state"><p>No products yet. Add your first one!</p></div>`;
    return;
  }

  grid.innerHTML = productsCache.map(p => `
    <div class="product-card">
      <img src="${imgUrl(p.img)}" class="product-img" onerror="this.onerror=null;this.src='Images/placeholder.svg'">
      <div class="product-info">
        <h4>${esc(p.name)}</h4>
        <p class="category">${esc(p.category)}</p>
        <p class="price">₹${p.price.toLocaleString("en-IN")}</p>
        <p style="font-size:12px;color:var(--muted)">Stock: ${p.stock}</p>
        ${p.isApproved === false ? `<p style="font-size:12px;color:var(--warning,#b6832b);font-weight:600">Pending admin approval</p>` : ""}
        <div class="product-card-actions">
          <button class="edit-btn" onclick="openEditModal('${p._id}')">Edit</button>
          <button class="delete-btn" onclick="deleteProduct('${p._id}')">Remove</button>
        </div>
      </div>
    </div>
  `).join("");
} catch (err) {
  grid.innerHTML = `<p style="color:var(--danger);padding:20px">Could not load products.</p>`;
}

}


/* LOAD SELLER ORDERS */

async function loadOrders() {
  const tbody = document.getElementById("ordersTableBody");
  tbody.innerHTML = `<tr><td colspan="6" class="loader">Loading…</td></tr>`;

  try {
    const orders = await Orders.sellerOrders();

    if (!orders.length) {
      tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><p>No orders yet.</p></div></td></tr>`;
      return;
    }

    tbody.innerHTML = orders.map(o => {
      const mine = o.items.filter(i => i.seller === user._id || i.sellerName === user.shopName || i.sellerName === user.name);
      const itemsLabel = mine.map(i => `${i.name} × ${i.qty}`).join(", ") || "—";
      return `
        <tr>
          <td><code style="font-size:11px">#${o._id.slice(-6).toUpperCase()}</code></td>
          <td>${esc(o.buyerName || "Guest")}<br><small style="color:var(--muted)">${esc(o.buyerEmail || "")}</small></td>
          <td>${esc(itemsLabel)}</td>
          <td><span class="status-badge status-${o.status}">${o.status}</span></td>
          <td>${new Date(o.createdAt).toLocaleDateString("en-IN")}</td>
          <td>
            <select class="status-select" onchange="updateOrderStatus('${o._id}', this.value)">
              ${["pending","confirmed","shipped","delivered","cancelled"].map(s =>
                `<option value="${s}" ${o.status===s?"selected":""}>${s}</option>`
              ).join("")}
            </select>
          </td>
        </tr>
      `;
    }).join("");
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="6" style="color:var(--danger)">Could not load orders.</td></tr>`;
  }
}

async function updateOrderStatus(id, status) {
  try {
    await Orders.updateStatus(id, status);
  } catch (err) {
    alert(err.message || "Could not update status");
    loadOrders();
  }
}


loadProducts();

</script>

</body>
</html>
