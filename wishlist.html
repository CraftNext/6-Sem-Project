<!-- this is wishlist.html -->
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Your Wishlist – CraftNext</title>
<link rel="stylesheet" href="style.css">
<script src="theme.js"></script>
</head>

<body>

<!-- NAVBAR -->

<header class="navbar">
    <a class="brand" href="index.html">CraftNext</a>

    <div>
        <a href="index.html" class="back-btn">← Back to Home</a>
        <span id="navUser"></span>
    </div>
</header>


<!-- WISHLIST SECTION -->

<section class="products">

<h2>Your Wishlist</h2>

<div class="product-grid" id="wishGrid"></div>

</section>


<script src="api.js"></script>
<script src="script.js"></script>


<script>

/* ================= LOGIN GUARD ================= */

const user = localStorage.getItem("cn_user")
? JSON.parse(localStorage.getItem("cn_user"))
: null;

if(!user){
alert("Please login to view your wishlist");
window.location.href = "login.html";
}


/* ================= NAVBAR AUTH ================= */

const navUser = document.getElementById("navUser");

if(user){

navUser.innerHTML = `
<span style="margin-left:10px;">Hi, ${user.name}</span>
${user.role === "admin" ? '<a href="admin.html" style="margin-left:10px;">Admin Panel</a>' : ""}
<a href="#" id="logoutBtn" style="margin-left:10px;">Logout</a>
`;

document.getElementById("logoutBtn").onclick = function(e){
e.preventDefault();
Auth.logout();
};

}else{

navUser.innerHTML = `
<a href="login.html" style="margin-left:10px;">Login</a>
`;

}


/* ================= LOAD WISHLIST FROM API ================= */

document.addEventListener("DOMContentLoaded", async () => {

    const ids = getWishlist();
    const grid = document.getElementById("wishGrid");

    if (ids.length === 0) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><h3>Your wishlist is empty</h3><p><a href="index.html">Browse products →</a></p></div>`;
        return;
    }

    grid.innerHTML = `<p style="padding:20px;color:#888">Loading…</p>`;

    try {
        const all = await Products.getAll();
        cacheProducts(all);

        const idSet = new Set(ids.map(String));
        const list = all.filter(p => idSet.has(String(p._id)));

        if (!list.length) {
            grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><h3>Your wishlisted items are no longer available.</h3></div>`;
            return;
        }

        grid.innerHTML = "";
        list.forEach(p => {
            const card = document.createElement("div");
            card.className = "product-card";
            card.innerHTML = productCardHTML(p);
            grid.appendChild(card);
        });
        renderWishlistIcons();
    } catch (err) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><p>Could not load wishlist. Make sure the backend is running.</p></div>`;
    }

});

</script>


</body>
</html>
